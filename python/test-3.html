<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Lingo - Тест 3: Цикли та Функції</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0a0f2c 0%,#1a1f4b 50%,#0f1535 100%);color:#fff;min-height:100vh}header{background:rgba(15,26,70,0.95);backdrop-filter:blur(10px);border-bottom:1px solid rgba(0,102,204,0.2);padding:20px 40px;display:flex;justify-content:space-between;align-items:center}.logo-header{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;background:linear-gradient(135deg,#0066cc,#00b4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;cursor:pointer}.header-btn{padding:10px 20px;background:rgba(0,102,204,0.2);border:1px solid rgba(0,102,204,0.4);border-radius:8px;color:#8899cc;cursor:pointer;transition:all 0.3s ease;font-family:'Inter',sans-serif;font-size:14px;font-weight:600}.header-btn:hover{background:rgba(0,102,204,0.4);color:#00b4ff}.container{max-width:900px;margin:0 auto;padding:40px 20px}.test-header{background:rgba(0,102,204,0.1);border:1px solid rgba(0,102,204,0.3);border-radius:15px;padding:30px;margin-bottom:30px;text-align:center}h1{font-size:32px;margin-bottom:10px;background:linear-gradient(135deg,#0066cc,#00b4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.test-desc{color:#8899cc;font-size:16px}.question{background:rgba(0,102,204,0.1);border:1px solid rgba(0,102,204,0.3);border-radius:12px;padding:25px;margin-bottom:20px}.question-num{color:#00b4ff;font-weight:700;margin-bottom:10px;font-size:14px}.question-text{color:#fff;font-size:16px;margin-bottom:15px;font-weight:600}.options{display:flex;flex-direction:column;gap:10px}.option{background:rgba(0,0,0,0.3);border:2px solid rgba(0,102,204,0.3);border-radius:8px;padding:12px 15px;cursor:pointer;transition:all 0.3s ease;color:#8899cc}.option:hover{background:rgba(0,102,204,0.2);border-color:rgba(0,102,204,0.6)}.option input{margin-right:10px;cursor:pointer}.option.selected{background:rgba(0,102,204,0.3);border-color:#0066cc;color:#00b4ff}.buttons{display:flex;gap:15px;margin-top:40px;justify-content:center}.btn{padding:12px 30px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.3s ease;font-family:'Inter',sans-serif;text-transform:uppercase;letter-spacing:1px}.btn-submit{background:linear-gradient(135deg,#0066cc,#00b4ff);color:white;box-shadow:0 0 20px rgba(0,102,204,0.3)}.btn-submit:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,102,204,0.4)}.btn-back{background:rgba(0,102,204,0.2);border:1px solid rgba(0,102,204,0.4);color:#8899cc}.btn-back:hover{background:rgba(0,102,204,0.4);color:#00b4ff}.result{display:none;background:rgba(0,102,204,0.1);border:1px solid rgba(0,102,204,0.3);border-radius:15px;padding:30px;text-align:center;margin-top:40px}.result.show{display:block}.result-score{font-size:48px;font-weight:700;color:#00b4ff;margin-bottom:15px}.result-text{color:#8899cc;font-size:18px;margin-bottom:20px}@media(max-width:768px){.container{padding:20px}h1{font-size:26px}.buttons{flex-direction:column}.btn{width:100%}}</style>
</head>
<body>
    <header>
        <div class="logo-header" onclick="window.location.href='../index.html'">Code Lingo</div>
        <button class="header-btn" onclick="window.location.href='../python-course.html'">← До курсу</button>
    </header>
    <div class="container">
        <div class="test-header">
            <h1>📝 Тест 3: Цикли та Функції</h1>
            <p class="test-desc">Перевіріть свої знання з Уроків 5-6.</p>
        </div>
        <div id="questions-container"></div>
        <div class="buttons">
            <button class="btn btn-submit" onclick="submitTest()">✓ Відправити відповіді</button>
            <button class="btn btn-back" onclick="window.location.href='../python-course.html'">← Назад</button>
        </div>
        <div id="result" class="result">
            <div class="result-score" id="score-text"></div>
            <div class="result-text" id="result-message"></div>
            <button class="btn btn-submit" onclick="window.location.href='../python-course.html'" style="margin-top: 20px;">Повернутися до курсу</button>
        </div>
    </div>
    <script>
        const questions = [
            {text:"Що робить цикл for?",options:["Виконує код один раз","Повторює код кілька разів","Створює змінну","Видаляє змінну"],correct:1},
            {text:"Як написати функцію?",options:["function name()","def name():","func name():","new name():"],correct:1},
            {text:"Що таке return в функції?",options:["Повертає до початку","Повертає значення функції","Видаляє функцію","Оновлює функцію"],correct:1},
            {text:"Скільки разів виконується цикл range(5)?",options:["4 рази","5 разів","6 разів","3 рази"],correct:1},
            {text:"Що таке параметр функції?",options:["Вихідне значення","Вхідне значення","Назва функції","Тип функції"],correct:1}
        ];
        let userAnswers = new Array(questions.length).fill(-1);
        function initTest(){const container=document.getElementById('questions-container');questions.forEach((q,idx)=>{const html=`<div class="question"><div class="question-num">Питання ${idx+1}</div><div class="question-text">${q.text}</div><div class="options">${q.options.map((opt,optIdx)=>`<label class="option" onclick="selectAnswer(${idx},${optIdx})"><input type="radio" name="q${idx}" value="${optIdx}" onchange="selectAnswer(${idx},${optIdx})">${opt}</label>`).join('')}</div></div>`;container.innerHTML+=html;});}
        function selectAnswer(qIdx,optIdx){userAnswers[qIdx]=optIdx;document.querySelectorAll(`[name="q${qIdx}"]`).forEach((inp,i)=>{inp.parentElement.classList.toggle('selected',i===optIdx);});}
        function submitTest(){let score=0;userAnswers.forEach((ans,idx)=>{if(ans===questions[idx].correct)score++;});const percentage=Math.round((score/questions.length)*100);document.getElementById('score-text').textContent=`${percentage}%`;document.getElementById('result-message').textContent=percentage>=80?'🎉 Чудово!':percentage>=60?'✓ Хороший результат!':'📚 Потренуйтесь';let userData=JSON.parse(localStorage.getItem('userData')||'{}');if(!userData.grades)userData.grades={};userData.grades.test3=percentage;localStorage.setItem('userData',JSON.stringify(userData));document.getElementById('result').classList.add('show');document.querySelectorAll('.question').forEach(q=>q.style.display='none');document.querySelectorAll('.btn-submit')[0].style.display='none';}
        window.addEventListener('load',initTest);
    </script>
</body>
</html>
