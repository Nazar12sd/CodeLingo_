<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Lingo - Тест 1</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0f2c 0%, #1a1f4b 50%, #0f1535 100%);
            color: #fff;
            
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(15, 26, 70, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 102, 204, 0.2);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            z-index: 1000;
            top: 0;
        }

        .logo-header {
            font-family: 'JetBrains Mono', monospace;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #0066cc, #00b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
        }

        .header-btn {
            padding: 10px 20px;
            background: rgba(0, 102, 204, 0.2);
            border: 1px solid rgba(0, 102, 204, 0.4);
            border-radius: 8px;
            color: #8899cc;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
        }

        .header-btn:hover {
            background: rgba(0, 102, 204, 0.4);
            color: #00b4ff;
        }

        .container {
            min-width: 900px;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;

            flex: 1;
        }

        .test-header {
            background: rgba(0, 102, 204, 0.1);
            border: 1px solid rgba(0, 102, 204, 0.3);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #0066cc, #00b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .test-desc {
            color: #8899cc;
            font-size: 16px;
        }

        .question {
            background: rgba(0, 102, 204, 0.1);
            border: 1px solid rgba(0, 102, 204, 0.3);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .question-num {
            color: #00b4ff;
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .question-text {
            color: #fff;
            font-size: 16px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(0, 102, 204, 0.3);
            border-radius: 8px;
            padding: 12px 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #8899cc;
        }

        .option:hover {
            background: rgba(0, 102, 204, 0.2);
            border-color: rgba(0, 102, 204, 0.6);
        }

        .option input {
            margin-right: 10px;
            cursor: pointer;
        }

        .option.selected {
            background: rgba(0, 102, 204, 0.3);
            border-color: #0066cc;
            color: #00b4ff;
        }

        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-submit {
            background: linear-gradient(135deg, #0066cc, #00b4ff);
            color: white;
            box-shadow: 0 0 20px rgba(0, 102, 204, 0.3);
        }
        .btn-result {
            background: linear-gradient(135deg, #0066cc, #00b4ff);
            color: white;
            box-shadow: 0 0 20px rgba(0, 102, 204, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 102, 204, 0.4);
        }

        .btn-back {
            background: rgba(0, 102, 204, 0.2);
            border: 1px solid rgba(0, 102, 204, 0.4);
            color: #8899cc;
        }

        .btn-back:hover {
            background: rgba(0, 102, 204, 0.4);
            color: #00b4ff;
        }

        .result {
            display: none;
            background: rgba(0, 102, 204, 0.1);
            border: 1px solid rgba(0, 102, 204, 0.3);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            margin-top: 40px;
        }

        .result.show {
            display: block;
        }

        .result-score {
            font-size: 48px;
            font-weight: 700;
            color: #00b4ff;
            margin-bottom: 15px;
        }

        .result-text {
            color: #8899cc;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .code-box {
            background: rgba(0, 0, 0, 0.3);
            border-left: 4px solid #00b4ff;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: #00b4ff;
            overflow-x: auto;
        }

        .code-box span {
            color: inherit;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 26px;
            }

            .buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

        /* Light theme */
        body.light-theme {
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e7ff 50%, #f0f4ff 100%);
            color: #1a1a1a;
        }

        body.light-theme header {
            background: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid rgba(0, 102, 204, 0.2);
        }

        body.light-theme .header-btn {
            background: rgba(0, 102, 204, 0.1);
            color: #0066cc;
            border-color: rgba(0, 102, 204, 0.3);
        }

        body.light-theme .test-header {
            background: rgba(0, 102, 204, 0.08);
            border-color: rgba(0, 102, 204, 0.2);
        }

        body.light-theme h1 {
            background: linear-gradient(135deg, #0066cc, #00b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        body.light-theme .question {
            background: rgba(0, 102, 204, 0.08);
            border-color: rgba(0, 102, 204, 0.2);
        }

        body.light-theme .option {
            background: rgba(0, 0, 0, 0.05);
            color: #333;
            border-color: rgba(0, 102, 204, 0.2);
        }

        body.light-theme .option.selected {
            background: rgba(0, 102, 204, 0.2);
            color: #0066cc;
        }

        body.light-theme .btn-submit {
            background: linear-gradient(135deg, #0066cc, #00b4ff);
        }
        .indent {
            margin-left: 100px;
        }
        .p_code {
            color: #8899cc;
            line-height: 1.8;
            margin-bottom: 15px;
            font-size: 16px;
            font-style: oblique;
        }
        .dropdown {
            position: relative;
            display: inline-block;
        }
        
        .dropdown-content {
            position: absolute;
            top: 120%;
            left: 0;
            background: rgba(15, 26, 70, 0.98);
            border: 1px solid rgba(0, 102, 204, 0.4);
            border-radius: 10px;
            min-width: 200px;
            padding: 8px;
            backdrop-filter: blur(10px);
            z-index: 999;
            
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s ease;
            
            display: flex;              /* ВАЖНО — всегда flex */
            flex-direction: column;
        }

        .dropdown:hover .dropdown-content {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .dropdown-btn {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 102, 204, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            color: #8899cc;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: left;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            width: 100%;
        }
        
        .dropdown-btn:hover {
            background: rgba(0, 102, 204, 0.3);
            color: #00b4ff;
            border-color: rgba(0, 102, 204, 0.6);
        }
        
        /* расстояние между кнопками */
        .dropdown-content {
            gap: 10px;
        }
        footer {
            background: rgba(15, 26, 70, 0.95);
            border-top: 1px solid rgba(0, 102, 204, 0.2);
            padding: 40px 20px;
            text-align: center;
            color: #8899cc;
            margin-top: 80px;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-header" onclick="goToSection('home')">Code Lingo</div>
        <div class="nav-buttons">
            <button class="header-btn" onclick="goToSection('home')">🏠 Головна</button>
            <div class="dropdown">
                <button class="header-btn" onclick="goToSection('learn')">📚 Вчитися</button>
                <div class="dropdown-content">
                    <button class="dropdown-btn" onclick="goToSection('python')">🐍 Вчити Python</button>
                    <button class="dropdown-btn" onclick="goToSection('js')">🟨 Вчити JavaScript</button>
                    <button class="dropdown-btn" onclick="goToSection('cplus')">💻 Вчити C++</button>
                </div>
            </div>
            <button class="header-btn" onclick="goToSection('settings')">⚙️ Налаштування</button>
            <button class="header-btn" onclick="goToSection('profile')">👤 Профіль</button>
            <button class="header-btn" onclick="logout()" style="background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.4);">🚪 Вихід</button>
        </div>
    </header>

    <div class="container">
        <div class="test-header">
            <h1>📝 Тест 1: Python основи</h1>
            <p class="test-desc">Перевіріть свої знання з Уроку 1. Вибирайте правильні відповіді.</p>
        </div>

        <div id="questions-container"></div>

        <div class="buttons">
            <button class="btn btn-submit" onclick="submitTest()">✓ Відправити відповіді</button>
            <button class="btn btn-back" onclick="window.location.href='../python-course.html'">← Назад</button>
        </div>

        <div id="result" class="result">
            <div class="result-score" id="score-text"></div>
            <div class="result-text" id="result-message"></div>
            <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap;">
                <button class="btn btn-result" onclick="window.location.href='../python-course.html'">Повернутися до курсу</button>
                <button class="btn btn-result" style="background: rgba(0, 102, 204, 0.4);" onclick="resetTest()">🔄 Заново</button>
            </div>
        </div>
    </div>

    <footer>
        <br>
        <p>© 2026 Code Lingo | Автор: Гайдай Назар |
        Зв'язок:
        
        Email: <a href="mailto:haidainazar@gmail.com">haidainazar@gmail.com</a>
        Telegram: <a href="https://t.me/Nonae247" target="_blank">@Nonae247</a></p>
        <br>
    </footer>

    <script>
        // Завантаження теми
        function loadTheme() {
            const settings = JSON.parse(localStorage.getItem('settings') || '{}');
            if (settings.theme === 'light') {
                document.body.classList.add('light-theme');
            } else {
                document.body.classList.remove('light-theme');
            }
        }

        loadTheme();

        // Перевірка авторизації
        const currentUser = localStorage.getItem('currentUser');
        if (!currentUser) {
            window.location.href = '../Registr.html';
        }

        function logout() {
            if (confirm('Ви впевнені, що хочете вийти?')) {
                localStorage.removeItem('currentUser');
                window.location.href = '../Registr.html';
            }
        }

        const questions = [
            {
                text: "Що таке Python?",
                options: [
                    "Назва змії",
                    "Мова програмування",
                    "Математична функція",
                    "Назва фільму"
                ],
                correct: 1
            },
            {
                text: "Яка з цих команд виведе <span class='p_code'>Привіт</span> ?",
                options: [
                    "<div class='code-box'>print(Привіт)</div>",
                    "<div class='code-box'>print(\"Привіт\")</div>",
                    "<div class='code-box'>print \"Привіт\"</div>",
                    "<div class='code-box'>print Привіт</div>"
                ],
                correct: 1
            },
            {
                text: "Для чого використовується Python?",
                options: [
                    "Для створення відеоігор",
                    "Для створення веб-сайтів",
                    "Для створення програм та аналізу даних",
                    "Всі відповіді правильні"
                ],
                correct: 3
            },
            {
                text: "Для чого використовується функція print() в Python?",
                options: [
                    "Для збереження даних",
                    "Для виведення тексту та чисел на екран",
                    "Для математичних обчислень",
                    "Для створення циклів"
                ],
                correct: 1
            },
            {
                text: "Що таке Програма?",
                options: [
                    "Це текст, який можна прочитати.",
                    "Це набір чисел, яку можна обчислити.",
                    "Це веб-сайт, який можна відвідати в Інтернеті.",
                    "Це набір команд, які виконує комп'ютер."
                ],
                correct: 3
            },
            {
                text: "На яку мову найбільше схожий синтаксис Python?",
                options: [
                    "На німецьку",
                    "На французьку",
                    "На англійську",
                    "На китайську"
                ],
                correct: 2
            },
            {
                text: "Що буде результатом виконання такого коду?<div class='code-box'>print(\"Code\")<br>print(\"Lingo\")</div>",
                options: [
                    "Виведе слово Code",
                    "Виведе Code<br>Lingo",
                    "Виведе \"Code Lingo\"",
                    "Виведе Code Lingo"
                ],
                correct: 1
            },
            {
                text: "Що буде результатом виконання такого коду?<div class='code-box'>print(Привіт)</div>",
                options: [
                    "Виведе (Привіт)",
                    "Виведе \"Привіт\"",
                    "Виведе Привіт",
                    "Виведе помилку",
                ],
                correct: 1
            },
            {
                text: "В якій послідовності виконує команди Python?",
                options: [
                    "Випадково",
                    "Справа наліво",
                    "Зверху вниз",
                    "Знизу вгору"
                ],
                correct: 2
            },
            {
                text: `Що виведе цей код?<div class='code-box'>print("Мені", 5 ,"років")</div>`,
                options: [
                    "Помилку",
                    "Мені 5 років",
                    "\"Мені\", 5 ,\"років\"",
                    "Мені5років"
                ],
                correct: 1
            },
            {
                text: "Що буде результатом виконання такого коду?<div class='code-box'>print(\"Code Lingo\")</div>",
                options: [
                    "Виведе слово Code",
                    "Виведе слово Lingo",
                    "Виведе \"Code Lingo\"",
                    "Виведе Code Lingo"
                ],
                correct: 3
            },
            {
                text: "Що буде результатом виконання такого коду?<div class='code-box'>print(123)</div>",
                options: [
                    "Виведе текст 123",
                    "Виведе число 123",
                    "Виведе помилку",
                    "Нічого не виведе"
                ],
                correct: 1
            }
        ];

        let userAnswers = new Array(questions.length).fill(-1);
        let questionMapping = {}; // Отслеживаем соответствие между индексами

        function shuffleArray(array) {
            const shuffled = array.map((q, idx) => ({ ...q, originalIndex: idx }));
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function initTest() {
            // Перемешиваем вопросы случайным образом
            const shuffledQuestions = shuffleArray(questions);
            const container = document.getElementById('questions-container');
            shuffledQuestions.forEach((q, displayIdx) => {
                const originalIdx = q.originalIndex;
                questionMapping[originalIdx] = displayIdx;
                const html = `
                    <div class="question">
                        <div class="question-num">Питання ${displayIdx + 1}</div>
                        <div class="question-text">${q.text}</div>
                        <div class="options">
                            ${q.options.map((opt, optIdx) => `
                                <label class="option" onclick="selectAnswer(${displayIdx}, ${optIdx})">
                                    <input type="radio" name="q${displayIdx}" value="${optIdx}" onchange="selectAnswer(${displayIdx}, ${optIdx})">
                                    ${opt}
                                </label>
                            `).join('')}
                        </div>
                    </div>
                `;
                const questionDiv = document.createElement('div');
                questionDiv.innerHTML = html;
                container.appendChild(questionDiv.firstElementChild);
            });
        }

        function selectAnswer(displayIdx, optIdx) {
            const shuffledIdx = Object.keys(questionMapping).find(k => questionMapping[k] === displayIdx);
            if (shuffledIdx !== undefined) {
                userAnswers[shuffledIdx] = optIdx;
            }
            // Update UI
            document.querySelectorAll(`label[onclick="selectAnswer(${displayIdx}, ${optIdx})"]`).forEach(label => {
                label.classList.toggle('selected');
            });
            document.querySelectorAll(`[name="q${displayIdx}"]`).forEach((inp, i) => {
                inp.parentElement.classList.toggle('selected', i === optIdx);
            });
        }

        function resetTest() {
            userAnswers = new Array(questions.length).fill(-1);
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            document.querySelectorAll('.question').forEach(q => q.style.display = 'block');
            document.querySelectorAll('.btn-submit:not([onclick="resetTest()"])').forEach(b => b.style.display = 'inline-block');
            document.getElementById('result').classList.remove('show');
            document.querySelectorAll('.btn-back').forEach(b => b.style.display = 'inline-block');
            document.querySelectorAll('.test-header').forEach(q => q.style.display = 'block');
        }

        function submitTest() {
            let score = 0;
            userAnswers.forEach((ans, idx) => {
                if (ans === questions[idx].correct) score++;
            });

            const percentage = Math.round((score / questions.length) * 100);
            const resultDiv = document.getElementById('result');
            const scoreText = document.getElementById('score-text');
            const resultMsg = document.getElementById('result-message');

            scoreText.textContent = `${percentage}%`;
            
            if (percentage >= 80) {
                resultMsg.textContent = '🎉 Чудово! Ви добре розумієте матеріал!';
            } else if (percentage >= 60) {
                resultMsg.textContent = '✓ Хороший результат! Тобі потрібно потренуватися.';
            } else {
                resultMsg.textContent = '📚 Рекомендуємо переглянути матеріал і спробувати ще раз.';
            }

            // Save grade and mark test as completed if passed
            let userData = JSON.parse(localStorage.getItem('userData') || '{}');
            if (!userData.grades) userData.grades = {};
            userData.grades.test1 = percentage;
            
            // Якщо оцінка >= 60%, позначити тест і урок як пройдені
            if (percentage >= 60) {
                userData.completedTests = userData.completedTests || [];
                userData.completedLessons = userData.completedLessons || [];
                const testNum = 1;
                if (!userData.completedTests.includes(testNum)) {
                    userData.completedTests.push(testNum);
                }
                if (!userData.completedLessons.includes(testNum)) {
                    userData.completedLessons.push(testNum);
                }
            }
            
            localStorage.setItem('userData', JSON.stringify(userData));

            resultDiv.classList.add('show');
            document.querySelectorAll('.test-header').forEach(q => q.style.display = 'none');
            document.querySelectorAll('.question').forEach(q => q.style.display = 'none');
            document.querySelectorAll('.btn-submit').forEach(b => b.style.display = 'none');
            document.querySelectorAll('.btn-back').forEach(b => b.style.display = 'none');
        }

        window.addEventListener('load', initTest);
        function goToSection(section) {
            if (section === 'home') {
                window.location.href = '/index.html';
            } else if (section === 'learn') {
                window.location.href = '/learn.html';
            } else if (section === 'settings') {
                window.location.href = '/settings.html';
            } else if (section === 'profile') {
                window.location.href = '/account.html';
            } else if (section === 'python') {
                window.location.href = '/python-course.html';
            }
        }
    </script>
</body>
</html>
