<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Lingo - Тест 1: Python основи</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0f2c 0%, #1a1f4b 50%, #0f1535 100%);
            color: #fff;
            min-height: 100vh;
        }

        header {
            background: rgba(15, 26, 70, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 102, 204, 0.2);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-header {
            font-family: 'JetBrains Mono', monospace;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #0066cc, #00b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
        }

        .header-btn {
            padding: 10px 20px;
            background: rgba(0, 102, 204, 0.2);
            border: 1px solid rgba(0, 102, 204, 0.4);
            border-radius: 8px;
            color: #8899cc;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
        }

        .header-btn:hover {
            background: rgba(0, 102, 204, 0.4);
            color: #00b4ff;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .test-header {
            background: rgba(0, 102, 204, 0.1);
            border: 1px solid rgba(0, 102, 204, 0.3);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #0066cc, #00b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .test-desc {
            color: #8899cc;
            font-size: 16px;
        }

        .question {
            background: rgba(0, 102, 204, 0.1);
            border: 1px solid rgba(0, 102, 204, 0.3);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .question-num {
            color: #00b4ff;
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .question-text {
            color: #fff;
            font-size: 16px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(0, 102, 204, 0.3);
            border-radius: 8px;
            padding: 12px 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #8899cc;
        }

        .option:hover {
            background: rgba(0, 102, 204, 0.2);
            border-color: rgba(0, 102, 204, 0.6);
        }

        .option input {
            margin-right: 10px;
            cursor: pointer;
        }

        .option.selected {
            background: rgba(0, 102, 204, 0.3);
            border-color: #0066cc;
            color: #00b4ff;
        }

        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-submit {
            background: linear-gradient(135deg, #0066cc, #00b4ff);
            color: white;
            box-shadow: 0 0 20px rgba(0, 102, 204, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 102, 204, 0.4);
        }

        .btn-back {
            background: rgba(0, 102, 204, 0.2);
            border: 1px solid rgba(0, 102, 204, 0.4);
            color: #8899cc;
        }

        .btn-back:hover {
            background: rgba(0, 102, 204, 0.4);
            color: #00b4ff;
        }

        .result {
            display: none;
            background: rgba(0, 102, 204, 0.1);
            border: 1px solid rgba(0, 102, 204, 0.3);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            margin-top: 40px;
        }

        .result.show {
            display: block;
        }

        .result-score {
            font-size: 48px;
            font-weight: 700;
            color: #00b4ff;
            margin-bottom: 15px;
        }

        .result-text {
            color: #8899cc;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .code-box {
            background: rgba(0, 0, 0, 0.3);
            border-left: 4px solid #00b4ff;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: #00b4ff;
            overflow-x: auto;
        }

        .code-box span {
            color: inherit;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 26px;
            }

            .buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-header" onclick="window.location.href='../index.html'">Code Lingo</div>
        <button class="header-btn" onclick="window.location.href='../python-course.html'">← До курсу</button>
    </header>

    <div class="container">
        <div class="test-header">
            <h1>📝 Тест 1: Python основи</h1>
            <p class="test-desc">Перевіріть свої знання з Уроків 1-2. Вибирайте правильні відповіді.</p>
        </div>

        <div id="questions-container"></div>

        <div class="buttons">
            <button class="btn btn-submit" onclick="submitTest()">✓ Відправити відповіді</button>
            <button class="btn btn-back" onclick="window.location.href='../python-course.html'">← Назад</button>
        </div>

        <div id="result" class="result">
            <div class="result-score" id="score-text"></div>
            <div class="result-text" id="result-message"></div>
            <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap;">
                <button class="btn btn-submit" onclick="window.location.href='../python-course.html'">Повернутися до курсу</button>
                <button class="btn btn-submit" style="background: rgba(0, 102, 204, 0.4);" onclick="resetTest()">🔄 Заново</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {
                text: "Що таке Python?",
                options: [
                    "Назва змії",
                    "Мова програмування",
                    "Математична функція",
                    "Назва фільму"
                ],
                correct: 1
            },
            {
                text: "Яка з цих команд виведе \"Привіт\"?",
                options: [
                    "<div class='code-box'>print(Привіт)</div>",
                    "<div class='code-box'>print(\"Привіт\")</div>",
                    "<div class='code-box'>print \"Привіт\"</div>",
                    "<div class='code-box'>print Привіт</div>"
                ],
                correct: 1
            },
            {
                text: "Для чого використовується Python?",
                options: [
                    "Для створення відеоігор",
                    "Для створення веб-сайтів",
                    "Для створення програм та аналізу даних",
                    "Всі відповіді правильні"
                ],
                correct: 3
            },
            {
                text: "Для чого використовується функція print() в Python?",
                options: [
                    "Для збереження даних",
                    "Для виведення тексту на екран",
                    "Для математичних обчислень",
                    "Для створення циклів"
                ],
                correct: 1
            },
            {
                text: "Що таке Програма?",
                options: [
                    "Це програма, яку можна встановити на телефон.",
                    "Це гра, яку можна грати на комп'ютері.",
                    "Це веб-сайт, який можна відвідати в Інтернеті.",
                    "Це алгоритм, записаний спеціальною мовою та призначений для виконання комп'ютером."
                ],
                correct: 3
            },
            {
                text: "На якій мові найбільше схожа синтаксис Python?",
                options: [
                    "На німецькій",
                    "На англійській",
                    "На французькій",
                    "На китайській"
                ],
                correct: 1
            },
            {
                text: "Який результат виконає цей код?<div class='code-box'>print(\"Code\")<br>print(\"Lingo\")</div>",
                options: [
                    "Виведе слово Code",
                    "Виведе Code<br>       Lingo",
                    "Виведе \"Code Lingo\"",
                    "Виведе Code Lingo"
                ],
                correct: 1
            },
            {
                text: "Де можна використовувати Python? (виберіть найповніший варіант)",
                options: [
                    "Тільки для ігор",
                    "Тільки для сайтів",
                    "Для ігор, сайтів, ботів, ШІ та аналізу даних",
                    "Тільки для аналізу даних"
                ],
                correct: 2
            },
            {
                text: "Як читає команди Python?",
                options: [
                    "Випадково",
                    "Справа наліво",
                    "Зверху вниз",
                    "Навпаки, ніж написано"
                ],
                correct: 2
            },
            {
                text: "Яка основна перевага Python для початківців?",
                options: [
                    "Найшвидший мова",
                    "Простота та читаємість коду",
                    "Найменший розмір файлів",
                    "Не потребує інтернету"
                ],
                correct: 1
            },
            {
                text: "Який результат виконає цей код?<div class='code-box'>print(\"Code Lingo\")</div>",
                options: [
                    "Виведе слово Code",
                    "Виведе слово Lingo",
                    "Виведе \"Code Lingo\"",
                    "Виведе Code Lingo"
                ],
                correct: 3
            },
            {
                text: "Що буде результатом виконання такого коду?<div class='code-box'>print(123)</div>",
                options: [
                    "Виведе текст 123",
                    "Виведе число 123",
                    "Виведе помилку",
                    "Нічого не виведе"
                ],
                correct: 1
            }
        ];

        let userAnswers = new Array(questions.length).fill(-1);

        function initTest() {
            const container = document.getElementById('questions-container');
            questions.forEach((q, idx) => {
                const html = `
                    <div class="question">
                        <div class="question-num">Питання ${idx + 1}</div>
                        <div class="question-text">${q.text}</div>
                        <div class="options">
                            ${q.options.map((opt, optIdx) => `
                                <label class="option" onclick="selectAnswer(${idx}, ${optIdx})">
                                    <input type="radio" name="q${idx}" value="${optIdx}" onchange="selectAnswer(${idx}, ${optIdx})">
                                    ${opt}
                                </label>
                            `).join('')}
                        </div>
                    </div>
                `;
                const questionDiv = document.createElement('div');
                questionDiv.innerHTML = html;
                container.appendChild(questionDiv.firstElementChild);
            });
        }

        function selectAnswer(qIdx, optIdx) {
            userAnswers[qIdx] = optIdx;
            // Update UI
            document.querySelectorAll(`label[onclick="selectAnswer(${qIdx}, ${optIdx})"]`).forEach(label => {
                label.classList.toggle('selected');
            });
            document.querySelectorAll(`[name="q${qIdx}"]`).forEach((inp, i) => {
                inp.parentElement.classList.toggle('selected', i === optIdx);
            });
        }

        function resetTest() {
            userAnswers = new Array(questions.length).fill(-1);
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            document.querySelectorAll('.question').forEach(q => q.style.display = 'block');
            document.querySelectorAll('.btn-submit:not([onclick="resetTest()"])').forEach(b => b.style.display = 'inline-block');
            document.getElementById('result').classList.remove('show');
        }

        function submitTest() {
            let score = 0;
            userAnswers.forEach((ans, idx) => {
                if (ans === questions[idx].correct) score++;
            });

            const percentage = Math.round((score / questions.length) * 100);
            const resultDiv = document.getElementById('result');
            const scoreText = document.getElementById('score-text');
            const resultMsg = document.getElementById('result-message');

            scoreText.textContent = `${percentage}%`;
            
            if (percentage >= 80) {
                resultMsg.textContent = '🎉 Чудово! Ви добре розумієте матеріал!';
            } else if (percentage >= 60) {
                resultMsg.textContent = '✓ Хороший результат! Но потрібно потренуватися.';
            } else {
                resultMsg.textContent = '📚 Рекомендуємо переглянути матеріал і спробувати ще раз.';
            }

            // Save grade
            let userData = JSON.parse(localStorage.getItem('userData') || '{}');
            if (!userData.grades) userData.grades = {};
            userData.grades.test1 = percentage;
            localStorage.setItem('userData', JSON.stringify(userData));

            resultDiv.classList.add('show');
            document.querySelectorAll('.question').forEach(q => q.style.display = 'none');
            document.querySelectorAll('.btn-submit').forEach(b => b.style.display = 'none');
        }

        window.addEventListener('load', initTest);
    </script>
</body>
</html>
