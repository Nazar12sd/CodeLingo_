<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Lingo - Тест 2</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0f2c 0%, #1a1f4b 50%, #0f1535 100%);
            color: #fff;
            
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(15, 26, 70, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 102, 204, 0.2);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            z-index: 1000;
            top: 0;
        }

        .logo-header {
            font-family: 'JetBrains Mono', monospace;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #0066cc, #00b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
        }

        .header-btn {
            padding: 10px 20px;
            background: rgba(0, 102, 204, 0.2);
            border: 1px solid rgba(0, 102, 204, 0.4);
            border-radius: 8px;
            color: #8899cc;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
        }

        .header-btn:hover {
            background: rgba(0, 102, 204, 0.4);
            color: #00b4ff;
        }

        .container {
            min-width: 900px;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;

            flex: 1;
        }

        .test-header {
            background: rgba(0, 102, 204, 0.1);
            border: 1px solid rgba(0, 102, 204, 0.3);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #0066cc, #00b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .test-desc {
            color: #8899cc;
            font-size: 16px;
        }

        .question {
            background: rgba(0, 102, 204, 0.1);
            border: 1px solid rgba(0, 102, 204, 0.3);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .question-num {
            color: #00b4ff;
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .question-text {
            color: #fff;
            font-size: 16px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(0, 102, 204, 0.3);
            border-radius: 8px;
            padding: 12px 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #8899cc;
        }

        .option:hover {
            background: rgba(0, 102, 204, 0.2);
            border-color: rgba(0, 102, 204, 0.6);
        }

        .option input {
            margin-right: 10px;
            cursor: pointer;
        }

        .option.selected {
            background: rgba(0, 102, 204, 0.3);
            border-color: #0066cc;
            color: #00b4ff;
        }

        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-submit {
            background: linear-gradient(135deg, #0066cc, #00b4ff);
            color: white;
            box-shadow: 0 0 20px rgba(0, 102, 204, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 102, 204, 0.4);
        }

        .btn-back {
            background: rgba(0, 102, 204, 0.2);
            border: 1px solid rgba(0, 102, 204, 0.4);
            color: #8899cc;
        }

        .btn-back:hover {
            background: rgba(0, 102, 204, 0.4);
            color: #00b4ff;
        }

        .result {
            display: none;
            background: rgba(0, 102, 204, 0.1);
            border: 1px solid rgba(0, 102, 204, 0.3);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            margin-top: 40px;
        }

        .result.show {
            display: block;
        }

        .result-score {
            font-size: 48px;
            font-weight: 700;
            color: #00b4ff;
            margin-bottom: 15px;
        }

        .result-text {
            color: #8899cc;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .code-box {
            background: rgba(0, 0, 0, 0.3);
            border-left: 4px solid #00b4ff;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: #00b4ff;
            overflow-x: auto;
        }

        .code-box span {
            color: inherit;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 26px;
            }

            .buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

        /* Light theme */
        body.light-theme {
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e7ff 50%, #f0f4ff 100%);
            color: #1a1a1a;
        }

        body.light-theme header {
            background: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid rgba(0, 102, 204, 0.2);
        }

        body.light-theme .header-btn {
            background: rgba(0, 102, 204, 0.1);
            color: #0066cc;
            border-color: rgba(0, 102, 204, 0.3);
        }

        body.light-theme .test-header {
            background: rgba(0, 102, 204, 0.08);
            border-color: rgba(0, 102, 204, 0.2);
        }

        body.light-theme h1 {
            background: linear-gradient(135deg, #0066cc, #00b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        body.light-theme .question {
            background: rgba(0, 102, 204, 0.08);
            border-color: rgba(0, 102, 204, 0.2);
        }

        body.light-theme .option {
            background: rgba(0, 0, 0, 0.05);
            color: #333;
            border-color: rgba(0, 102, 204, 0.2);
        }

        body.light-theme .option.selected {
            background: rgba(0, 102, 204, 0.2);
            color: #0066cc;
        }

        body.light-theme .btn-submit {
            background: linear-gradient(135deg, #0066cc, #00b4ff);
        }

        .text-input-container {
            margin: 20px 0;
        }
        
        .btn-result {
            background: linear-gradient(135deg, #0066cc, #00b4ff);
            color: white;
            box-shadow: 0 0 20px rgba(0, 102, 204, 0.3);
        }

        .text-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(0, 102, 204, 0.3);
            border-radius: 8px;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .text-input:focus {
            outline: none;
            background: rgba(0, 0, 0, 0.5);
            border-color: #0066cc;
            box-shadow: 0 0 10px rgba(0, 102, 204, 0.3);
        }

        body.light-theme .text-input {
            background: rgba(0, 0, 0, 0.05);
            color: #333;
            border-color: rgba(0, 102, 204, 0.2);
        }

        body.light-theme .text-input:focus {
            background: rgba(0, 0, 0, 0.08);
            border-color: #0066cc;
        }

        /* Checkbox styles */
        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(0, 102, 204, 0.5);
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: all 0.2s ease;
            margin-right: 10px;
            vertical-align: middle;
        }

        input[type="checkbox"]:checked {
            background: linear-gradient(135deg, #0066cc, #00b4ff);
            border-color: #00b4ff;
        }

        input[type="checkbox"]:focus {
            outline: none;
            box-shadow: 0 0 8px rgba(0, 102, 204, 0.4);
        }

        body.light-theme input[type="checkbox"] {
            background: rgba(0, 102, 204, 0.1);
            border-color: rgba(0, 102, 204, 0.3);
        }

        body.light-theme input[type="checkbox"]:checked {
            background: linear-gradient(135deg, #0066cc, #00b4ff);
            border-color: #0066cc;
        }
        .dropdown {
            position: relative;
            display: inline-block;
        }
        
        .dropdown-content {
            position: absolute;
            top: 120%;
            left: 0;
            background: rgba(15, 26, 70, 0.98);
            border: 1px solid rgba(0, 102, 204, 0.4);
            border-radius: 10px;
            min-width: 200px;
            padding: 8px;
            backdrop-filter: blur(10px);
            z-index: 999;
            
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s ease;
            
            display: flex;              /* ВАЖНО — всегда flex */
            flex-direction: column;
        }

        .dropdown:hover .dropdown-content {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .dropdown-btn {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 102, 204, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            color: #8899cc;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: left;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            width: 100%;
        }
        
        .dropdown-btn:hover {
            background: rgba(0, 102, 204, 0.3);
            color: #00b4ff;
            border-color: rgba(0, 102, 204, 0.6);
        }
        
        /* расстояние между кнопками */
        .dropdown-content {
            gap: 10px;
        }
        footer {
            background: rgba(15, 26, 70, 0.95);
            border-top: 1px solid rgba(0, 102, 204, 0.2);
            padding: 40px 20px;
            text-align: center;
            color: #8899cc;
            margin-top: 80px;
        }
    </style>
</head>

    <div class="container">
        <div class="test-header">
            <h1>📝 Тест 2: Змінні та числа</h1>
            <p class="test-desc">Перевіріть свої знання з Уроку 2. Вибирайте правильні відповіді.</p>
        </div>

        <div id="questions-container"></div>

        <div class="buttons">
            <button class="btn btn-submit" onclick="submitTest()">✓ Відправити відповіді</button>
            <button class="btn btn-back" onclick="window.location.href='../python-course.html'">← Назад</button>
        </div>

                <button class="btn btn-result" onclick="window.location.href='../python-course.html'">Повернутися до курсу</button>
                <button class="btn btn-result" style="background: rgba(0, 102, 204, 0.4);" onclick="resetTest()">🔄 Заново</button>
            </div>
        </div>
    </div>

    <script>
        // Завантаження теми
        function loadTheme() {
            const settings = JSON.parse(localStorage.getItem('settings') || '{}');
            if (settings.theme === 'light') {
                document.body.classList.add('light-theme');
            } else {
                document.body.classList.remove('light-theme');
            }
        }

        loadTheme();

        // Перевірка авторизації
        const currentUser = localStorage.getItem('currentUser');
        if (!currentUser) {
            window.location.href = '../Registr.html';
        }

        function logout() {
            if (confirm('Ви впевнені, що хочете вийти?')) {
                localStorage.removeItem('currentUser');
                window.location.href = '../Registr.html';
            }
        }

        const questions = [
            {
                text: "Що виведе цей код?<div class='code-box'>a = 5<br>print(a)</div>",
                options: [
                    "Виведе 5",
                    "Виведе a",
                    "Виведе помилку",
                    "Виведе 0"
                ],
                correct: 0
            },
            {
                text: "Виберіть правильний рядок коду, який присвоює змінній x число 15:",
                options: [
                    "x = 15",
                    "x 15",
                    "x <- 15",
                    "x = \"15\""
                ],
                correct: 0
            },
            {
                text: "Що виведе цей код?<div class='code-box'>a = Андрій<br>print(a)</div>",
                options: [
                    "Виведе Андрій",
                    "Виведе a",
                    "Виведе помилку",
                    "Виведе 0"
                ],
                correct: 2
            },
            {
                text: "Який тип даних має змінна a після виконання цього коду?<div class='code-box'>a = 3.14</div>",
                options: [
                    "Ціле число (int)",
                    "Дійсне число (float)",
                    "Рядок (str)",
                    "Булевий тип (bool)"
                ],
                correct: 1
            },
            {
                text: "Що виведе цей код?<div class='code-box'>x = 10<br>y = 5<br>print(x + y)</div>",
                options: [
                    "15",
                    "10 + 5",
                    "105",
                    "Помилка"
                ],
                correct: 0
            },
            {
                text: "Що виведе цей код?<div class='code-box'>a = \"Володін\"<br>b = \"Назар\"<br>print(a + b)</div>",
                options: [
                    "Виведе ВолодінНазар",
                    "Виведе a + b",
                    "Виведе помилку",
                    "Виведе Володін Назар"
                ],
                correct: 0
            },
            {
                text: "Що виведе цей код?<div class='code-box'>a = 5 + 5<br>print(a)</div>",
                options: [
                    "Виведе 10",
                    "Виведе a",
                    "Виведе помилку",
                    "Виведе 5 + 5"
                ],
                correct: 0
            },
            {
                text: "Напишіть команду Python, яка присвоює змінній x значення 5. Пишіть без пробілів.",
                type: "text",
                correct: "x=5"
            },
            {
                text: "Виберіть ВСІ правильні типи даних у Python:",
                options: [
                    "int (ціле число)",
                    "float (дійсне число)",
                    "string (рядок)",
                    "letter (буква)"
                ],
                correct: [0, 1, 2]
            },
            {
                text: "Що виведе цей код?<div class='code-box'>x = 2.5<br>y = 3<br>print(x + y)</div>",
                options: [
                    "5.5",
                    "5",
                    "Помилка",
                    "2.5 + 3"
                ],
                correct: 0
            },
            {
                text: "Виберіть ВСІ способи присвоєння змінній значення:",
                options: [
                    "a = 10",
                    "a = \"текст\"",
                    "a = 3.14",
                    "a = [1, 2, 3]"
                ],
                correct: [0, 1, 2, 3]
            },
            {
                text: "Напишіть команду Python для виведення значення змінної name. Пишіть без пробілів.",
                type: "text",
                correct: "print(name)"
            }
        ];

        let userAnswers = new Array(questions.length).fill(-1);
        let questionMapping = {}; // Отслеживаем соответствие между индексами

        function shuffleArray(array) {
            const shuffled = array.map((q, idx) => ({ ...q, originalIndex: idx }));
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function initTest() {
            // Перемешиваем вопросы случайным образом
            const shuffledQuestions = shuffleArray(questions);
            const container = document.getElementById('questions-container');
            shuffledQuestions.forEach((q, displayIdx) => {
                const originalIdx = q.originalIndex;
                questionMapping[originalIdx] = displayIdx;
                let html = '';
                if (q.type === 'text') {
                    // Текстовое поле для ввода
                    html = `
                        <div class="question">
                            <div class="question-num">Питання ${displayIdx + 1}</div>
                            <div class="question-text">${q.text}</div>
                            <div class="text-input-container">
                                <input type="text" id="q${displayIdx}-input" class="text-input" placeholder="Введіть відповідь..." onchange="selectTextAnswer(${displayIdx}, this.value)">
                            </div>
                        </div>
                    `;
                } else if (Array.isArray(q.correct)) {
                    // Checkboxes для вопросов с несколькими правильными ответами
                    html = `
                        <div class="question">
                            <div class="question-num">Питання ${displayIdx + 1} (Виберіть всі правильні відповіді)</div>
                            <div class="question-text">${q.text}</div>
                            <div class="options">
                                ${q.options.map((opt, optIdx) => `
                                    <label class="option" onclick="selectMultipleAnswer(${displayIdx}, ${optIdx})">
                                        <input type="checkbox" name="q${displayIdx}" value="${optIdx}" onchange="selectMultipleAnswer(${displayIdx}, ${optIdx})">
                                        ${opt}
                                    </label>
                                `).join('')}
                            </div>
                        </div>
                    `;
                } else {
                    // Обычные radio buttons
                    html = `
                        <div class="question">
                            <div class="question-num">Питання ${displayIdx + 1}</div>
                            <div class="question-text">${q.text}</div>
                            <div class="options">
                                ${q.options.map((opt, optIdx) => `
                                    <label class="option" onclick="selectAnswer(${displayIdx}, ${optIdx})">
                                        <input type="radio" name="q${displayIdx}" value="${optIdx}" onchange="selectAnswer(${displayIdx}, ${optIdx})">
                                        ${opt}
                                    </label>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
                const questionDiv = document.createElement('div');
                questionDiv.innerHTML = html;
                container.appendChild(questionDiv.firstElementChild);
            });
        }

        function selectAnswer(displayIdx, optIdx) {
            const shuffledIdx = Object.keys(questionMapping).find(k => questionMapping[k] === displayIdx);
            if (shuffledIdx !== undefined) {
                userAnswers[shuffledIdx] = optIdx;
            }
            // Update UI
            document.querySelectorAll(`label[onclick="selectAnswer(${displayIdx}, ${optIdx})"]`).forEach(label => {
                label.classList.toggle('selected');
            });
            document.querySelectorAll(`[name="q${displayIdx}"]`).forEach((inp, i) => {
                inp.parentElement.classList.toggle('selected', i === optIdx);
            });
        }

        function selectTextAnswer(displayIdx, value) {
            const shuffledIdx = Object.keys(questionMapping).find(k => questionMapping[k] === displayIdx);
            if (shuffledIdx !== undefined) {
                userAnswers[shuffledIdx] = value;
            }
        }

        function selectMultipleAnswer(displayIdx, optIdx) {
            const shuffledIdx = Object.keys(questionMapping).find(k => questionMapping[k] === displayIdx);
            if (shuffledIdx !== undefined) {
                if (!Array.isArray(userAnswers[shuffledIdx])) {
                    userAnswers[shuffledIdx] = [];
                }
                const idx = userAnswers[shuffledIdx].indexOf(optIdx);
                if (idx > -1) {
                    userAnswers[shuffledIdx].splice(idx, 1);
                } else {
                    userAnswers[shuffledIdx].push(optIdx);
                }
                // Update UI
                document.querySelectorAll(`[name="q${displayIdx}"]`).forEach((inp, i) => {
                    inp.parentElement.classList.toggle('selected', userAnswers[shuffledIdx].includes(i));
                });
            }
        }

        function resetTest() {
            userAnswers = new Array(questions.length).fill(-1);
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            document.querySelectorAll('.question').forEach(q => q.style.display = 'block');
            document.querySelectorAll('.btn-submit:not([onclick="resetTest()"])').forEach(b => b.style.display = 'inline-block');
            document.getElementById('result').classList.remove('show');
            document.querySelectorAll('.btn-back').forEach(b => b.style.display = 'inline-block');
            document.querySelectorAll('.test-header').forEach(q => q.style.display = 'block');
        }

        function submitTest() {
            let score = 0;
            userAnswers.forEach((ans, idx) => {
                if (questions[idx].type === 'text') {
                    // Для текстовых вопросов сравниваем текст без пробелов
                    const userText = String(ans).toLowerCase().replace(/\s/g, '');
                    const correctText = String(questions[idx].correct).toLowerCase().replace(/\s/g, '');
                    if (userText === correctText) {
                        score++;
                    }
                } else if (Array.isArray(questions[idx].correct)) {
                    // Для вопросов с несколькими правильными ответами
                    const userAnswersArray = Array.isArray(ans) ? ans.sort((a, b) => a - b) : [];
                    const correctAnswersArray = questions[idx].correct.sort((a, b) => a - b);
                    if (userAnswersArray.length === correctAnswersArray.length && 
                        userAnswersArray.every((val, i) => val === correctAnswersArray[i])) {
                        score++;
                    }
                } else {
                    // Для обычных вопросов с выбором
                    if (ans === questions[idx].correct) {
                        score++;
                    }
                }
            });

            const percentage = Math.round((score / questions.length) * 100);
            const resultDiv = document.getElementById('result');
            const scoreText = document.getElementById('score-text');
            const resultMsg = document.getElementById('result-message');

            scoreText.textContent = `${percentage}%`;
            
            if (percentage >= 80) {
                resultMsg.textContent = '🎉 Чудово! Ви добре розумієте матеріал!';
            } else if (percentage >= 60) {
                resultMsg.textContent = '✓ Хороший результат! Pero потрібно потренуватися.';
            } else {
                resultMsg.textContent = '📚 Рекомендуємо переглянути матеріал і спробувати ще раз.';
            }

            // Save grade and mark test as completed if passed
            let userData = JSON.parse(localStorage.getItem('userData') || '{}');
            if (!userData.grades) userData.grades = {};
            userData.grades.test2 = percentage;
            
            // Якщо оцінка >= 60%, позначити тест і урок як пройдені
            if (percentage >= 60) {
                userData.completedTests = userData.completedTests || [];
                userData.completedLessons = userData.completedLessons || [];
                const testNum = 1;
                if (!userData.completedTests.includes(testNum)) {
                    userData.completedTests.push(testNum);
                }
                if (!userData.completedLessons.includes(testNum)) {
                    userData.completedLessons.push(testNum);
                }
            }
            
            localStorage.setItem('userData', JSON.stringify(userData));

            resultDiv.classList.add('show');
            document.querySelectorAll('.test-header').forEach(q => q.style.display = 'none');
            document.querySelectorAll('.question').forEach(q => q.style.display = 'none');
            document.querySelectorAll('.btn-submit').forEach(b => b.style.display = 'none');
            document.querySelectorAll('.btn-back').forEach(b => b.style.display = 'none');
        }

        window.addEventListener('load', initTest);
        function goToSection(section) {
            if (section === 'home') {
                window.location.href = '/index.html';
            } else if (section === 'learn') {
                window.location.href = '/learn.html';
            } else if (section === 'settings') {
                window.location.href = '/settings.html';
            } else if (section === 'profile') {
                window.location.href = '/account.html';
            } else if (section === 'python') {
                window.location.href = '/python-course.html';
            }
        }
    </script>
</body>
</html>
