<!DOCTYPE html>
<html lang="en">

<head>
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name ="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta charset="utf-8"/>

<meta http-equiv="pragma" content="no-cache"/>

<title>CodeLingo</title>

<style>

body{
    margin:0;
    padding:0;
    border:0;

    /* темний але не чорний фон */
    background: linear-gradient(135deg,#1a1f2b,#222b3a,#1e2a44);
    background-size: 400% 400%;
    animation: bgMove 15s ease infinite;

    color:#cccccc;
    font-family: Arial;
}

/* плавна анімація фону */
@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

canvas{
    image-rendering: optimizeSpeed;
    -webkit-interpolation-mode: nearest-neighbor;
    -ms-touch-action:none;
    touch-action:none;

    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);

    border-radius:12px;

    /* красиве світіння */
    box-shadow:
        0 0 40px rgba(0,0,0,0.7),
        0 0 80px rgba(0,120,255,0.15);

    border:2px solid rgba(255,255,255,0.08);
}

:-webkit-full-screen #canvas{
    width:100%;
    height:100%;
}

:-webkit-full-screen{
    width:100%;
    height:100%;
}

div.gm4html5_div_class{
    margin:0;
    padding:0;
    border:0;
}

div.gm4html5_login{
    padding:20px;
    position:absolute;
    border:solid 2px #000000;
    background-color:#404040;
    color:#00ff00;
    border-radius:15px;
    box-shadow:#101010 20px 20px 40px;
}

div.gm4html5_cancel_button{
    float:right;
}

div.gm4html5_login_button{
    float:left;
}

div.gm4html5_login_header{
    text-align:center;
}

</style>

</head>

<body>

<div class="gm4html5_div_class" id="gm4html5_div_id">

<canvas id="canvas" width="1280" height="720">

<p>Your browser doesn't support HTML5 canvas.</p>

</canvas>

</div>

<script type="text/javascript" src="html5game/CodeLingo(DEMO).js?cachebust=111298065"></script>

<script>
window.onload = GameMaker_Init;
</script>

</body>

</html>
