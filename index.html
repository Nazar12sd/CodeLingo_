<!DOCTYPE html>
<html lang="en">

<head>
<meta http-equiv="X-UA-Compatible" content="IE=edge"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta charset="utf-8"/>

<meta http-equiv="pragma" content="no-cache"/>

<title>CodeLingo</title>

<style>

html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    background: radial-gradient(circle, #1a1a1a, #000);
    color:#ccc;
}

/* контейнер игры */
#gm4html5_div_id{
    display:flex;
    justify-content:center;
    align-items:center;
    width:100%;
    height:100%;
}

/* canvas игры */
canvas{
    image-rendering: pixelated;
    image-rendering: crisp-edges;

    max-width:100vw;
    max-height:100vh;

    width:auto;
    height:auto;
}

/* fullscreen */
:fullscreen canvas{
    width:100%;
    height:100%;
}

/* стили GameMaker */
div.gm4html5_login{
    padding:20px;
    position:absolute;
    border:solid 2px #000;
    background:#404040;
    color:#00ff00;
    border-radius:15px;
    box-shadow:#101010 20px 20px 40px;
}

div.gm4html5_cancel_button{
    float:right;
}

div.gm4html5_login_button{
    float:left;
}

div.gm4html5_login_header{
    text-align:center;
}

</style>

</head>

<body>

<div id="gm4html5_div_id">

<canvas id="canvas" width="1080" height="1080">
<p>Your browser doesn't support HTML5 canvas.</p>
</canvas>

</div>

<script src="html5game/CodeLingo(DEMO).js?cachebust=1925567512"></script>

<script>
window.onload = GameMaker_Init;
</script>

</body>
</html>
