<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Lingo - Налаштування</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0f2c 0%, #1a1f4b 50%, #0f1535 100%);
            color: #fff;
            min-height: 100vh;
        }

        header {
            background: rgba(15, 26, 70, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 102, 204, 0.2);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-header {
            font-family: 'JetBrains Mono', monospace;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #0066cc, #00b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
        }

        .header-btn {
            padding: 10px 20px;
            background: rgba(0, 102, 204, 0.2);
            border: 1px solid rgba(0, 102, 204, 0.4);
            border-radius: 8px;
            color: #8899cc;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
        }

        .header-btn:hover {
            background: rgba(0, 102, 204, 0.4);
            color: #00b4ff;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #0066cc, #00b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .settings-group {
            background: rgba(0, 102, 204, 0.1);
            border: 1px solid rgba(0, 102, 204, 0.3);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 25px;
        }

        .settings-group h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #00b4ff;
            border-bottom: 2px solid rgba(0, 102, 204, 0.3);
            padding-bottom: 15px;
        }

        .setting-item {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .setting-label {
            font-weight: 600;
            color: #8899cc;
        }

        .setting-control {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        select, input[type="range"] {
            padding: 10px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(0, 102, 204, 0.3);
            border-radius: 8px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
        }

        select:focus, input[type="range"]:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: 0 0 15px rgba(0, 102, 204, 0.2);
        }

        select option {
            background: #1a1f4b;
            color: #fff;
        }

        .toggle {
            display: flex;
            gap: 10px;
        }

        .toggle-btn {
            padding: 8px 15px;
            background: rgba(0, 102, 204, 0.2);
            border: 1px solid rgba(0, 102, 204, 0.4);
            border-radius: 6px;
            color: #8899cc;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 600;
        }

        .toggle-btn.active {
            background: linear-gradient(135deg, #0066cc, #00b4ff);
            border-color: transparent;
            color: white;
        }

        .volume-display {
            min-width: 50px;
            text-align: right;
            color: #00b4ff;
            font-weight: 600;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn.save {
            background: linear-gradient(135deg, #0066cc, #00b4ff);
            color: white;
            box-shadow: 0 0 20px rgba(0, 102, 204, 0.3);
        }

        .btn.save:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 102, 204, 0.4);
        }

        .btn.back {
            background: rgba(0, 102, 204, 0.2);
            border: 1px solid rgba(0, 102, 204, 0.4);
            color: #8899cc;
        }

        .btn.back:hover {
            background: rgba(0, 102, 204, 0.4);
            color: #00b4ff;
        }

        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert.success {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid #22c55e;
            color: #86efac;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 28px;
            }

            .setting-item {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-header" onclick="window.location.href='index.html'">Code Lingo</div>
        <button class="header-btn" onclick="window.location.href='index.html'">← Назад</button>
    </header>

    <div class="container">
        <h1>⚙️ Налаштування</h1>

        <div id="alert" class="alert"></div>

        <!-- Тема -->
        <div class="settings-group">
            <h2>🎨 Оформлення</h2>
            
            <div class="setting-item">
                <span class="setting-label">Тема інтерфейсу</span>
                <div class="setting-control">
                    <div class="toggle">
                        <button class="toggle-btn active" onclick="setTheme('dark', this)">🌙 Темна</button>
                        <button class="toggle-btn" onclick="setTheme('light', this)">☀️ Світла</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Звук -->
        <div class="settings-group">
            <h2>🔊 Звук</h2>
            
            <div class="setting-item">
                <span class="setting-label">Гучність музики</span>
                <div class="setting-control">
                    <input type="range" id="musicVolume" min="0" max="100" value="50" style="width: 200px;">
                    <span class="volume-display" id="volumeDisplay">50%</span>
                </div>
            </div>
        </div>

        <!-- Мова -->
        <div class="settings-group">
            <h2>🌐 Мова</h2>
            
            <div class="setting-item">
                <span class="setting-label">Мова інтерфейсу</span>
                <div class="setting-control">
                    <select id="language">
                        <option value="uk" selected>🇺🇦 Українська</option>
                        <option value="en">🇬🇧 English</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Сповіщення -->
        <div class="settings-group">
            <h2>🔔 Сповіщення</h2>
            
            <div class="setting-item">
                <span class="setting-label">Отримувати сповіщення</span>
                <div class="setting-control">
                    <div class="toggle">
                        <button class="toggle-btn active" id="notif-toggle" onclick="toggleNotifications(this)">✓ Увімкнено</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Кнопки -->
        <div class="btn-group">
            <button class="btn save" onclick="saveSettings()">💾 Зберегти</button>
            <button class="btn back" onclick="window.location.href='index.html'">← Назад</button>
        </div>
    </div>

    <script>
        let notifications = true;

        // Завантаження налаштувань
        window.addEventListener('load', () => {
            const settings = JSON.parse(localStorage.getItem('settings') || '{}');
            
            document.getElementById('language').value = settings.language || 'uk';
            document.getElementById('musicVolume').value = settings.musicVolume || 50;
            document.getElementById('volumeDisplay').textContent = (settings.musicVolume || 50) + '%';
            notifications = settings.notifications !== false;

            if (settings.theme === 'light') {
                document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
                document.querySelectorAll('.toggle-btn')[1].classList.add('active');
            }
        });

        // Налаштування гучності
        document.getElementById('musicVolume')?.addEventListener('input', function() {
            document.getElementById('volumeDisplay').textContent = this.value + '%';
        });

        function setTheme(theme, btn) {
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function toggleNotifications(btn) {
            notifications = !notifications;
            btn.textContent = notifications ? '✓ Увімкнено' : '✗ Вимкнено';
            btn.classList.toggle('active');
        }

        function saveSettings() {
            const settings = {
                language: document.getElementById('language').value,
                musicVolume: parseInt(document.getElementById('musicVolume').value),
                theme: document.querySelector('.toggle-btn.active')?.textContent.includes('Темна') ? 'dark' : 'light',
                notifications: notifications
            };

            localStorage.setItem('settings', JSON.stringify(settings));

            // Показати повідомлення
            const alert = document.getElementById('alert');
            alert.textContent = '✓ Налаштування збережені успішно!';
            alert.className = 'alert show success';
            
            setTimeout(() => {
                alert.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
