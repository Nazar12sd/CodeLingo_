<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Lingo - Налаштування</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0f2c 0%, #1a1f4b 50%, #0f1535 100%);
            color: #fff;
            
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body.light-theme {
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e7ff 50%, #f0f4ff 100%);
            color: #1a1a1a;
        }

        body.light-theme header {
            background: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid rgba(0, 102, 204, 0.2);
        }

        body.light-theme .header-btn {
            background: rgba(0, 102, 204, 0.1);
            color: #0066cc;
            border-color: rgba(0, 102, 204, 0.3);
        }

        body.light-theme .header-btn:hover {
            background: rgba(0, 102, 204, 0.2);
            color: #0066cc;
        }

        body.light-theme .settings-group {
            background: rgba(0, 102, 204, 0.08);
            border-color: rgba(0, 102, 204, 0.2);
        }

        body.light-theme .settings-group h2 {
            color: #0066cc;
            border-color: rgba(0, 102, 204, 0.2);
        }

        body.light-theme .setting-label {
            color: #333;
        }

        body.light-theme select,
        body.light-theme input[type="range"] {
            background: rgba(0, 0, 0, 0.05);
            color: #333;
            border-color: rgba(0, 102, 204, 0.2);
        }

        body.light-theme .toggle-btn {
            background: rgba(0, 102, 204, 0.1);
            color: #0066cc;
            border-color: rgba(0, 102, 204, 0.2);
        }

        body.light-theme .toggle-btn.active {
            background: rgba(0, 102, 204, 0.3);
            color: #0066cc;
            border-color: #0066cc;
        }

        header {
            background: rgba(15, 26, 70, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 102, 204, 0.2);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            z-index: 1000;
            top: 0;
        }

        .logo-header {
            font-family: 'JetBrains Mono', monospace;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #0066cc, #00b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
        }

        .header-btn {
            padding: 10px 20px;
            background: rgba(0, 102, 204, 0.2);
            border: 1px solid rgba(0, 102, 204, 0.4);
            border-radius: 8px;
            color: #8899cc;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
        }

        .header-btn:hover {
            background: rgba(0, 102, 204, 0.4);
            color: #00b4ff;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;

            flex: 1;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #0066cc, #00b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .settings-group {
            background: rgba(0, 102, 204, 0.1);
            border: 1px solid rgba(0, 102, 204, 0.3);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 25px;
        }

        .settings-group h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #00b4ff;
            border-bottom: 2px solid rgba(0, 102, 204, 0.3);
            padding-bottom: 15px;
        }

        .setting-item {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .setting-label {
            font-weight: 600;
            color: #8899cc;
        }

        .setting-control {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        select, input[type="range"] {
            padding: 10px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(0, 102, 204, 0.3);
            border-radius: 8px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
        }

        select:focus, input[type="range"]:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: 0 0 15px rgba(0, 102, 204, 0.2);
        }

        select option {
            background: #1a1f4b;
            color: #fff;
        }

        .toggle {
            display: flex;
            gap: 10px;
        }

        .toggle-btn {
            padding: 8px 15px;
            background: rgba(0, 102, 204, 0.2);
            border: 1px solid rgba(0, 102, 204, 0.4);
            border-radius: 6px;
            color: #8899cc;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 600;
        }

        .toggle-btn.active {
            background: linear-gradient(135deg, #0066cc, #00b4ff);
            border-color: transparent;
            color: white;
        }

        .volume-display {
            min-width: 50px;
            text-align: right;
            color: #00b4ff;
            font-weight: 600;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn.save {
            background: linear-gradient(135deg, #0066cc, #00b4ff);
            color: white;
            box-shadow: 0 0 20px rgba(0, 102, 204, 0.3);
        }

        .btn.save:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 102, 204, 0.4);
        }

        .btn.back {
            background: rgba(0, 102, 204, 0.2);
            border: 1px solid rgba(0, 102, 204, 0.4);
            color: #8899cc;
        }

        .btn.back:hover {
            background: rgba(0, 102, 204, 0.4);
            color: #00b4ff;
        }

        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert.success {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid #22c55e;
            color: #86efac;
        }

        footer {
            background: rgba(15, 26, 70, 0.95);
            border-top: 1px solid rgba(0, 102, 204, 0.2);
            padding: 40px 20px;
            text-align: center;
            color: #8899cc;
            margin-top: 80px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 28px;
            }

            .setting-item {
                flex-direction: column;
                align-items: flex-start;
            }
        }
        .dropdown {
            position: relative;
            display: inline-block;
        }
        
        .dropdown-content {
            position: absolute;
            top: 120%;
            left: 0;
            background: rgba(15, 26, 70, 0.98);
            border: 1px solid rgba(0, 102, 204, 0.4);
            border-radius: 10px;
            min-width: 200px;
            padding: 8px;
            backdrop-filter: blur(10px);
            z-index: 999;
            
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s ease;
            
            display: flex;              /* ВАЖНО — всегда flex */
            flex-direction: column;
        }

        .dropdown:hover .dropdown-content {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .dropdown-btn {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 102, 204, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            color: #8899cc;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: left;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            width: 100%;
        }
        
        .dropdown-btn:hover {
            background: rgba(0, 102, 204, 0.3);
            color: #00b4ff;
            border-color: rgba(0, 102, 204, 0.6);
        }
        
        /* расстояние между кнопками */
        .dropdown-content {
            gap: 10px;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-header" onclick="goToSection('home')">Code Lingo</div>
        <div class="nav-buttons">
            <button class="header-btn" onclick="goToSection('home')">🏠 Головна</button>
            <div class="dropdown">
                <button class="header-btn" onclick="goToSection('learn')">📚 Вчитися</button>
                <div class="dropdown-content">
                    <button class="dropdown-btn" onclick="goToSection('python')">🐍 Вчити Python</button>
                    <button class="dropdown-btn" onclick="goToSection('js')">🟨 Вчити JavaScript</button>
                    <button class="dropdown-btn" onclick="goToSection('cplus')">💻 Вчити C++</button>
                </div>
            </div>
            <button class="header-btn" onclick="goToSection('settings')">⚙️ Налаштування</button>
            <button class="header-btn" onclick="goToSection('profile')">👤 Профіль</button>
            <button class="header-btn" onclick="logout()" style="background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.4);">🚪 Вихід</button>
        </div>
    </header>

    <div class="container">
        <h1 data-i18n="title">⚙️ Налаштування</h1>

        <div id="alert" class="alert"></div>

        

        <!-- Кнопки -->
        <div class="btn-group">
            <button class="btn save" onclick="saveSettings()" data-i18n="saveBtn">💾 Зберегти</button>
            <button class="btn back" onclick="window.location.href='index.html'" data-i18n="backBtn">← Назад</button>
        </div>
    </div>

    <footer>
        <br>
        <p>© 2026 Code Lingo | Автор: Гайдай Назар |
        Зв'язок:
        
        Email: <a href="mailto:haidainazar@gmail.com">haidainazar@gmail.com</a>
        Telegram: <a href="https://t.me/Nonae247" target="_blank">@Nonae247</a></p>
        <br>
    </footer>

    <script>
        // Перевірка авторизації
        const currentUser = localStorage.getItem('currentUser');
        if (!currentUser) {
            window.location.href = 'Registr.html';
        }

        function logout() {
            if (confirm('Ви впевнені, що хочете вийти?')) {
                localStorage.removeItem('currentUser');
                window.location.href = 'Registr.html';
            }
        }

        let notifications = true;
        document.getElementById('language').addEventListener('change', function() {
            applyLanguage(this.value);
        });

        const translations = {
            uk: {
                title: "⚙️ Налаштування",
                design: "🎨 Оформлення",
                sound: "🔊 Звук",
                languageTitle: "🌐 Мова",
                notificationsTitle: "🔔 Сповіщення",
                themeLabel: "Тема інтерфейсу",
                volumeLabel: "Гучність музики",
                langLabel: "Мова інтерфейсу",
                notifLabel: "Отримувати сповіщення",
                saveBtn: "💾 Зберегти",
                backBtn: "← Назад",
                darkThemeLabel: "🌙 Темна",
                lightThemeLabel: "☀️ Світла",
                on: "✓ Увімкнено",
                off: "✗ Вимкнено"
            },
            en: {
                title: "⚙️ Settings",
                design: "🎨 Appearance",
                sound: "🔊 Sound",
                languageTitle: "🌐 Language",
                notificationsTitle: "🔔 Notifications",
                themeLabel: "Interface theme",
                volumeLabel: "Music volume",
                langLabel: "Interface language",
                notifLabel: "Receive notifications",
                saveBtn: "💾 Save",
                backBtn: "← Back",
                dark: "🌙 Dark",
                light: "☀️ Light",
                on: "✓ Enabled",
                off: "✗ Disabled"
            }
        };
        function applyLanguage(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });
        }
        // Завантаження налаштувань
        window.addEventListener('load', () => {
            const settings = JSON.parse(localStorage.getItem('settings') || '{}');
            
            document.getElementById('language').value = settings.language || 'uk';
            document.getElementById('musicVolume').value = settings.musicVolume || 50;
            document.getElementById('volumeDisplay').textContent = (settings.musicVolume || 50) + '%';
            notifications = settings.notifications !== false;

            // Загрузить тему
            if (settings.theme === 'light') {
                document.body.classList.add('light-theme');
                document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.toggle-btn')[1].classList.add('active');
            } else {
                document.body.classList.remove('light-theme');
                document.querySelectorAll('.toggle-btn')[0].classList.add('active');
            }
            applyLanguage(settings.language || 'uk');
        });

        // Налаштування гучності
        document.getElementById('musicVolume')?.addEventListener('input', function() {
            document.getElementById('volumeDisplay').textContent = this.value + '%';
        });

        function setTheme(theme, btn) {
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // Применить тему
            if (theme === 'light') {
                document.body.classList.add('light-theme');
            } else {
                document.body.classList.remove('light-theme');
            }
        }

        function toggleNotifications(btn) {
            notifications = !notifications;
            btn.textContent = notifications ? '✓ Увімкнено' : '✗ Вимкнено';
            btn.classList.toggle('active');
        }

        function saveSettings() {
            const theme = document.querySelector('.toggle-btn.active')?.textContent.includes('Темна') ? 'dark' : 'light';
            const settings = {
                language: document.getElementById('language').value,
                musicVolume: parseInt(document.getElementById('musicVolume').value),
                theme: theme,
                notifications: notifications
            };

            localStorage.setItem('settings', JSON.stringify(settings));

            // Применить тему
            if (theme === 'light') {
                document.body.classList.add('light-theme');
            } else {
                document.body.classList.remove('light-theme');
            }

            // Показати повідомлення
            const alert = document.getElementById('alert');
            alert.textContent = '✓ Налаштування збережені успішно!';
            alert.className = 'alert show success';
            
            setTimeout(() => {
                alert.classList.remove('show');
            }, 3000);
        }
        function goToSection(section) {
            if (section === 'home') {
                window.location.href = 'index.html';
            } else if (section === 'learn') {
                window.location.href = 'learn.html';
            } else if (section === 'settings') {
                window.location.href = 'settings.html';
            } else if (section === 'profile') {
                window.location.href = 'account.html';
            } else if (section === 'python') {
                window.location.href = 'python-course.html';
            }
        }
    </script>
</body>
</html>
